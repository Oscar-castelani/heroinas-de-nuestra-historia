<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-labelledby="heroTitle heroDesc">
  <title id="heroTitle">Ilustración de mujeres en la independencia</title>
  <desc id="heroDesc">Composición ilustrada de tres siluetas femeninas con vestimenta de época, banderas y ramas de laurel, evocando la participación de las mujeres en los procesos independentistas.</desc>
  <defs>
    <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#DCEEF8"/>
      <stop offset="55%" stop-color="#E8DFF5"/>
      <stop offset="100%" stop-color="#FFF8E7"/>
    </linearGradient>
    <radialGradient id="sunGlow" cx="50%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#D8C27A" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#D8C27A" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="800" height="600" fill="url(#skyGrad)"/>
  <circle cx="400" cy="210" r="260" fill="url(#sunGlow)"/>

  <!-- laurel branches -->
  <g fill="none" stroke="#CFE8D5" stroke-width="6" stroke-linecap="round" opacity="0.9">
    <path d="M60 560 C 140 480, 120 380, 90 300"/>
    <path d="M740 560 C 660 480, 680 380, 710 300"/>
  </g>
  <g fill="#CFE8D5">
    <ellipse cx="95" cy="330" rx="16" ry="9" transform="rotate(-30 95 330)"/>
    <ellipse cx="80" cy="390" rx="16" ry="9" transform="rotate(-15 80 390)"/>
    <ellipse cx="100" cy="450" rx="16" ry="9" transform="rotate(-35 100 450)"/>
    <ellipse cx="70" cy="510" rx="16" ry="9" transform="rotate(-10 70 510)"/>
    <ellipse cx="705" cy="330" rx="16" ry="9" transform="rotate(30 705 330)"/>
    <ellipse cx="720" cy="390" rx="16" ry="9" transform="rotate(15 720 390)"/>
    <ellipse cx="700" cy="450" rx="16" ry="9" transform="rotate(35 700 450)"/>
    <ellipse cx="730" cy="510" rx="16" ry="9" transform="rotate(10 730 510)"/>
  </g>

  <!-- three stylised silhouettes -->
  <g opacity="0.95">
    <!-- left figure -->
    <g transform="translate(210,240)">
      <path d="M0 0 C -6 -34 6 -34 0 -66 C 22 -70 32 -50 30 -30 C 46 -10 50 40 40 120 C 30 200 -30 200 -40 120 C -50 40 -46 -10 -30 -30 C -32 -50 -22 -70 0 -66Z" fill="#A8DADC"/>
      <circle cx="0" cy="-90" r="26" fill="#F5E6D3"/>
      <path d="M-46 40 C -70 60 -70 110 -50 140" stroke="#5E6472" stroke-width="5" fill="none" stroke-linecap="round" opacity="0.35"/>
    </g>
    <!-- center figure (taller, holding a small flag) -->
    <g transform="translate(400,210)">
      <path d="M0 0 C -8 -38 8 -38 0 -74 C 26 -78 36 -56 34 -34 C 52 -10 56 50 44 140 C 32 230 -32 230 -44 140 C -56 50 -52 -10 -34 -34 C -36 -56 -26 -78 0 -74Z" fill="#E8DFF5"/>
      <circle cx="0" cy="-100" r="29" fill="#F5E6D3"/>
      <path d="M40 -30 L100 -70 L40 10 Z" fill="#D8C27A" opacity="0.9"/>
      <line x1="40" y1="-70" x2="40" y2="40" stroke="#8a7638" stroke-width="4"/>
    </g>
    <!-- right figure -->
    <g transform="translate(590,240)">
      <path d="M0 0 C -6 -34 6 -34 0 -66 C 22 -70 32 -50 30 -30 C 46 -10 50 40 40 120 C 30 200 -30 200 -40 120 C -50 40 -46 -10 -30 -30 C -32 -50 -22 -70 0 -66Z" fill="#CFE8D5"/>
      <circle cx="0" cy="-90" r="26" fill="#F5E6D3"/>
      <path d="M46 40 C 70 60 70 110 50 140" stroke="#5E6472" stroke-width="5" fill="none" stroke-linecap="round" opacity="0.35"/>
    </g>
  </g>

  <!-- ground line -->
  <path d="M0 460 C 200 430, 600 430, 800 460 L800 600 L0 600 Z" fill="#F5E6D3" opacity="0.6"/>

  <!-- small stars -->
  <g fill="#D8C27A">
    <circle cx="140" cy="110" r="3.5"/>
    <circle cx="660" cy="130" r="3.5"/>
    <circle cx="600" cy="90" r="2.5"/>
    <circle cx="200" cy="80" r="2.5"/>
  </g>
</svg>
